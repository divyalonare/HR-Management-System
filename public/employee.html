<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>Welcome, <span id="userName"></span></h1>
            <button class="danger" id="logoutBtn">Log Out</button>
        </div>

        <div class="card">
            <h2>Apply for Leave</h2>
            <p id="applyError" class="error" style="display:none;"></p>
            <p id="applySuccess" class="success" style="display:none;"></p>
            <form id="leaveForm">
                <label for="leaveType">Leave Type</label>
                <select id="leaveType" required>
                    <option value="Sick Leave">Sick Leave</option>
                    <option value="Casual Leave">Casual Leave</option>
                    <option value="Earned Leave">Earned Leave</option>
                </select>

                <label for="startDate">Start Date</label>
                <input type="date" id="startDate" required>

                <label for="endDate">End Date</label>
                <input type="date" id="endDate" required>

                <label for="reason">Reason</label>
                <textarea id="reason" rows="3" maxlength="300" required></textarea>

                <button type="submit">Submit Request</button>
            </form>
        </div>

        <div class="card">
            <h2>My Leave History</h2>
            <table id="leaveTable">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Reason</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="leaveTableBody">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/api.js"></script>
    <script>
        requireAuth(['employee']);

        document.getElementById('userName').textContent = localStorage.getItem('name') || localStorage.getItem('employeeId');

        document.getElementById('logoutBtn').addEventListener('click', logout);

        async function loadMyLeaves() {
            const tbody = document.getElementById('leaveTableBody');
            try {
                const data = await apiFetch('/api/my');
                if (!data.leaves.length) {
                    tbody.innerHTML = '<tr><td colspan="5">No leave requests yet.</td></tr>';
                    return;
                }
                tbody.innerHTML = data.leaves.map(l => `
                    <tr>
                        <td>${l.leaveType}</td>
                        <td>${new Date(l.startDate).toLocaleDateString()}</td>
                        <td>${new Date(l.endDate).toLocaleDateString()}</td>
                        <td>${escapeHtml(l.reason)}</td>
                        <td class="status-${l.status.toLowerCase()}">${l.status}</td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5">Error loading leaves: ${err.message}</td></tr>`;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

    document.getElementById('leaveForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const applyError = document.getElementById('applyError');
    const applySuccess = document.getElementById('applySuccess');
    applyError.style.display = 'none';
    applySuccess.style.display = 'none';

    const leaveType = document.getElementById('leaveType').value;
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const reason = document.getElementById('reason').value;

    try {
        await apiFetch('/api/apply', {
            method: 'POST',
            body: JSON.stringify({ leaveType, startDate, endDate, reason })
        });
        applySuccess.textContent = 'Leave request submitted successfully.';
        applySuccess.style.display = 'block';
        document.getElementById('leaveForm').reset();
        loadLeaves();
    } catch (err) {
        applyError.textContent = err.message;
        applyError.style.display = 'block';
    }
});

        loadMyLeaves();
    </script>
</body>
</html>
